name: Scorecard

# Removed `branch_protection_rule` trigger — that event runs without commit
# context and causes startup_failure. Schedule + push on main is sufficient
# for OSSF Scorecard to track supply-chain hygiene over time.

on:
  schedule:
    - cron: '17 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    uses: szl-holdings/.github/.github/workflows/reusable-scorecard.yml@main
